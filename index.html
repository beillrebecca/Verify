<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Recomen - 認証</title>
  <link href="https://fonts.googleapis.com/css2?family=Galada&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="verify-container">
  <div class="verify-box">

    <!-- ロゴ -->
    <div class="verify-logo">Recomen</div>

    <!-- メール用メッセージ -->
    <p id="emailMessage" class="verify-text">
      確認メールを送信しました。<br>
      メール内のリンクをクリックして認証してください。
    </p>

    <!-- 電話番号用コード入力 -->
    <p id="codeMessage" class="verify-text" style="display:none;">
      確認コードを入力してください
    </p>
    <input type="text" id="code" placeholder="確認コード" style="display:none;">

    <!-- 認証ボタン -->
    <button id="verifyBtn">認証</button>

    <!-- 再送信ボタン（電話番号用） -->
    <p id="resendCode" class="resend" style="display:none;">
      コードを再送信
    </p>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>

<!-- verify.js -->
<script src="script.js"></script>
</body>
</html>
