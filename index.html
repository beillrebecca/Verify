<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Recomen - 認証</title>
  <link href="https://fonts.googleapis.com/css2?family=Galada&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="verify-container">
  <div class="verify-box">

    <!-- ロゴ -->
    <div class="verify-logo">Recomen</div>

    <!-- 説明 -->
    <p class="verify-text">
      確認コードを入力してください
    </p>

    <!-- コード入力 -->
    <input type="text" id="code" placeholder="確認コード（電話番号の場合のみ）">

    <!-- 認証ボタン -->
    <button id="verifyBtn">認証</button>

    <!-- 再送信 -->
    <p id="resendCode" class="resend">
      コードを再送信
    </p>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>

<!-- verify.js -->
<script src="verify.js"></script>
</body>
</html>
